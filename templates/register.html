{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-5">

    <h3 class="text-center mb-4">Create Account</h3>

    <form method="post" onsubmit="return validateRegister()">

      <!-- Name -->
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" required>
        <small class="text-danger d-none" id="emailError">
          Invalid email format
        </small>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
        <small class="text-danger d-none" id="passwordError">
          Password must be at least 6 characters
        </small>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" required>
        <small class="text-danger d-none" id="confirmError">
          Passwords do not match
        </small>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-success w-100">
        Register
      </button>

    </form>

    <p class="text-center mt-3">
      Already have an account?
      <a href="{{ url_for('login') }}">Login</a>
    </p>

  </div>
</div>

<!-- JavaScript -->
<script>
function validateRegister() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const confirmPassword = document.getElementById("confirmPassword").value;

  let valid = true;

  // Reset errors
  document.getElementById("emailError").classList.add("d-none");
  document.getElementById("passwordError").classList.add("d-none");
  document.getElementById("confirmError").classList.add("d-none");

  // Email validation
  if (!email.includes("@")) {
    document.getElementById("emailError").classList.remove("d-none");
    valid = false;
  }

  // Password length validation
  if (password.length < 6) {
    document.getElementById("passwordError").classList.remove("d-none");
    valid = false;
  }

  // Password match validation
  if (password !== confirmPassword) {
    document.getElementById("confirmError").classList.remove("d-none");
    valid = false;
  }

  return valid; // true → submit form, false → stop
}
</script>

{% endblock %}
