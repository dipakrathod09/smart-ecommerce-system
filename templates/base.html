<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Smart E-Commerce{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <!-- Brand -->
    <a class="navbar-brand" href="{{ url_for('home') }}">Smart E-Commerce</a>

    <!-- Mobile toggle -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">

        <!-- Products: visible to everyone -->
        <li class="nav-item">
          <a class="nav-link" href="{{ url_for('products') }}">Products</a>
        </li>

        {% if session.get('user_id') %}

          <!-- Cart -->
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('view_cart') }}">Cart</a>
          </li>

          <!-- Admin Panel (only admin) -->
          {% if session.get('role') == 'admin' %}
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('admin_products') }}">Admin Panel</a>
          </li>
          {% endif %}

          <!-- Dashboard -->
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard') }}">Dashboard</a>
          </li>

          <!-- Logout -->
          <li class="nav-item">
            <a class="nav-link text-warning" href="{{ url_for('logout') }}">Logout</a>
          </li>

        {% else %}

          <!-- Login / Register -->
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('login') }}">Login</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('register') }}">Register</a>
          </li>

        {% endif %}

      </ul>
    </div>
  </div>
</nav>

<!-- PAGE CONTENT -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
