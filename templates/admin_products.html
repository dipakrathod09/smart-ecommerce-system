{% extends "base.html" %}

{% block title %}Admin Products{% endblock %}

{% block content %}
<h2>Manage Products</h2>

<a href="{{ url_for('add_product') }}" class="btn btn-success mb-3">
  Add Product
</a>

<table class="table table-bordered">
  <tr>
    <th>Name</th>
    <th>Price</th>
    <th>Stock</th>
    <th>Actions</th>
  </tr>

  {% for p in products %}
  <tr>
    <td>{{ p.name }}</td>
    <td>₹ {{ p.price }}</td>
    <td>{{ p.stock }}</td>
    <td>
      <a href="{{ url_for('edit_product', product_id=p.id) }}" class="btn btn-sm btn-warning">Edit</a>
      <a href="{{ url_for('delete_product', product_id=p.id) }}" class="btn btn-sm btn-danger">Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
